title: Joufflu WPF Components
description: >-
  WPF inputs and reusable components for .NET, with a small design system
  (brushes, dimensions, sizing and spacing helpers).

# GitHub Pages: served from the /docs folder on the main branch.
url: https://ndegheselle.github.io
baseurl: /Joufflu

# just-the-docs is served through GitHub Pages' native remote-theme support.
remote_theme: just-the-docs/just-the-docs@v0.8.2
plugins:
  - jekyll-remote-theme

# Sidebar / search
search_enabled: true
heading_anchors: true

aux_links:
  "GitHub repository":
    - "https://github.com/ndegheselle/Joufflu/"
aux_links_new_tab: true

# Coloured callout boxes used with {: .note } in the pages.
callouts:
  note:
    title: Note
    color: blue
